<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Each-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <header><h1>Each-Sketch games.</h1></header>
        
        <div class="main">
            <div class="settings">
                <p id="color-control-msg">Select a color</p>
               <input id="color-control" type="color">
               <button id="rainbow-btn" value="rainbow">Rainbow</button>              
               <button id="eraser-btn"  value="eraser">Eraser</button> 
               <button id="clear-btn"  value="clear">Clear</button>   
               <input id="grid-size" value="0" type="range">  
               <p id="grid-pxl">Grid size</p>      
               
            </div>
            <div class="grid">                                                                        
            </div>
        </div>
        
        <h2 id="h2-footer">The devloper:-</h2>
        <footer>              
           <p>Built by: 
            <a id="links" href="https://github.com/r2idw">R2</a> |
            <a id="links" href="https://github.com/r2idw">Source</a> 
           </p> 
           <span> <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-icon.png"></span>
        </footer>
        <script src="main.js"></script>
    </body>
</html>
